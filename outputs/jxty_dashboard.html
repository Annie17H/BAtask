function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function fmtDate(d) {
  return d.substring(0,4) + '-' + d.substring(4,6) + '-' + d.substring(6,8);
}

function calcMA(n, data) {
  var r = [];
  for (var i = 0; i < data.length; i++) {
    if (i < n - 1) { r.push(null); continue; }
    var s = 0;
    for (var j = 0; j < n; j++) s += data[i-j].close;
    r.push(+(s/n).toFixed(2));
  }
  return r;
}

var UP = '#e62e2e', DOWN = '#1ca01c';

function getFilteredData(range) {
  if (range === 'all') return rawData;
  var last = rawData[rawData.length-1];
  var y = parseInt(last.date.substring(0,4));
  var m = parseInt(last.date.substring(4,6));
  var months = range==='1m'?1:range==='3m'?3:6;
  m -= months;
  while (m <= 0) { m += 12; y--; }
  var cutoff = '' + y + (m<10?'0'+m:m) + '01';
  return rawData.filter(function(d){ return d.date >= cutoff; });
}

var mainChart, pctChart, monthlyChart;

function renderMain(data) {
  var dates = data.map(function(d){return fmtDate(d.date)});
  var ohlc = data.map(function(d){return [d.open, d.close, d.low, d.high]});
  var ma5 = calcMA(5, data);
  var ma10 = calcMA(10, data);
  var ma20 = calcMA(20, data);
  var vols = data.map(function(d){return {value:d.vol, itemStyle:{color: d.close>=d.open?UP:DOWN}}});

  mainChart.setOption({
    animation: false,
    tooltip: {
      trigger: 'axis',
      axisPointer: {type:'cross'},
      formatter: function(params) {
        var idx = params[0].dataIndex;
        var item = data[idx];
        if (!item) return '';
        var pct = item.pct_chg;
        var clr = pct >= 0 ? UP : DOWN;
        return '<b>'+fmtDate(item.date)+'</b><br/>'
          + '开盘: '+item.open.toFixed(2)+'<br/>'
          + '收盘: <b style="color:'+(item.close>=item.open?UP:DOWN)+'">'+item.close.toFixed(2)+'</b><br/>'
          + '最高: '+item.high.toFixed(2)+'<br/>'
          + '最低: '+item.low.toFixed(2)+'<br/>'
          + '涨跌: <span style="color:'+clr+'">'+(pct>=0?'+':'')+pct.toFixed(2)+'%</span><br/>'
          + '成交量: '+(item.vol/10000).toFixed(1)+'万手<br/>'
          + '成交额: '+(item.amount/10000).toFixed(1)+'万元';
      }
    },
    axisPointer: {link: [{xAxisIndex:'all'}]},
    grid: [
      {left:'8%', right:'3%', top:'4%', height:'62%'},
      {left:'8%', right:'3%', top:'72%', height:'18%'}
    ],
    xAxis: [
      {type:'category', data:dates, gridIndex:0, axisLabel:{show:false}, boundaryGap:true, axisLine:{onZero:false}, axisTick:{alignWithLabel:false}},
      {type:'category', data:dates, gridIndex:1, axisLabel:{fontSize:10, interval:Math.floor(dates.length/6)}, boundaryGap:true, axisLine:{onZero:false}}
    ],
    yAxis: [
      {scale:true, gridIndex:0, splitArea:{show:true}},
      {scale:true, gridIndex:1, splitNumber:2, axisLabel:{formatter:function(v){return (v/10000).toFixed(0)+'万'}}}
    ],
    dataZoom: [
      {type:'inside', xAxisIndex:[0,1], start:0, end:100},
      {type:'slider', xAxisIndex:[0,1], start:0, end:100, top:'93%', height:18}
    ],
    series: [
      {name:'K线', type:'candlestick', data:ohlc, xAxisIndex:0, yAxisIndex:0, itemStyle:{color:UP, color0:DOWN, borderColor:UP, borderColor0:DOWN}},
      {name:'MA5', type:'line', data:ma5, xAxisIndex:0, yAxisIndex:0, smooth:true, lineStyle:{width:1, color:'#e8b339'}, symbol:'none'},
      {name:'MA10', type:'line', data:ma10, xAxisIndex:0, yAxisIndex:0, smooth:true, lineStyle:{width:1, color:'#4da6ff'}, symbol:'none'},
      {name:'MA20', type:'line', data:ma20, xAxisIndex:0, yAxisIndex:0, smooth:true, lineStyle:{width:1, color:'#b373e6'}, symbol:'none'},
      {name:'成交量', type:'bar', data:vols, xAxisIndex:1, yAxisIndex:1}
    ]
  }, true);
}

function renderPct(data) {
  var bins = {};
  data.forEach(function(d) {
    var k = Math.floor(d.pct_chg);
    bins[k] = (bins[k]||0) + 1;
  });
  var keys = Object.keys(bins).map(Number).sort(function(a,b){return a-b});
  pctChart.setOption({
    tooltip:{trigger:'axis', formatter:function(p){return '涨跌幅 '+p[0].name+'%~'+(parseInt(p[0].name)+1)+'%<br/>天数: <b>'+p[0].value+'</b>'}},
    grid:{left:'10%', right:'5%', top:'5%', bottom:'12%'},
    xAxis:{type:'category', data:keys.map(function(k){return k+'%'}), axisLabel:{rotate:30, fontSize:10}},
    yAxis:{type:'value', name:'天数'},
    series:[{type:'bar', data:keys.map(function(k){return {value:bins[k], itemStyle:{color:k>=0?UP:DOWN}}})}]
  }, true);
}

function renderMonthly(data) {
  var monthly = {};
  data.forEach(function(d) {
    var m = d.date.substring(0,6);
    if (!monthly[m]) monthly[m] = {open:d.open, close:d.close, high:d.high, low:d.low, vol:d.vol, count:1};
    else {
      monthly[m].close = d.close;
      monthly[m].high = Math.max(monthly[m].high, d.high);
      monthly[m].low = Math.min(monthly[m].low, d.low);
      monthly[m].vol += d.vol;
      monthly[m].count++;
    }
  });
  var months = Object.keys(monthly).sort();
  var pctArr = [];
  for (var i = 0; i < months.length; i++) {
    var m = months[i];
    var prev = i > 0 ? monthly[months[i-1]].close : monthly[m].open;
    var pct = (monthly[m].close - prev) / prev * 100;
    pctArr.push({value:+pct.toFixed(2), itemStyle:{color:pct>=0?UP:DOWN}});
  }
  monthlyChart.setOption({
    tooltip:{trigger:'axis', formatter:function(p){
      var m = months[p[0].dataIndex];
      var info = monthly[m];
      return m.substring(0,4)+'-'+m.substring(4)+'<br/>月涨跌: <b style="color:'+(p[0].value>=0?UP:DOWN)+'">'+(p[0].value>=0?'+':'')+p[0].value+'%</b><br/>最高: '+info.high.toFixed(2)+'<br/>最低: '+info.low.toFixed(2)+'<br/>成交量: '+(info.vol/10000).toFixed(0)+'万手';
    }},
    grid:{left:'10%', right:'5%', top:'5%', bottom:'10%'},
    xAxis:{type:'category', data:months.map(function(m){return m.substring(0,4)+'-'+m.substring(4)}), axisLabel:{fontSize:11}},
    yAxis:{type:'value', name:'%', axisLabel:{formatter:'{value}%'}},
    series:[{type:'bar', data:pctArr}]
  }, true);
}

function updateStats(data) {
  var latest = data[data.length-1];
  var first = data[0];
  var totalChange = (latest.close - first.close) / first.close * 100;
  var avgVol = 0;
  var maxP = -Infinity, minP = Infinity;
  data.forEach(function(d) {
    avgVol += d.vol;
    if (d.high > maxP) maxP = d.high;
    if (d.low < minP) minP = d.low;
  });
  avgVol /= data.length;

  document.getElementById('stats-bar').innerHTML =
    '<div class="stat-card"><div class="label">最新价</div><div class="value">'+latest.close.toFixed(2)+'</div><div class="sub '+(latest.pct_chg>=0?'up':'down')+'">'+(latest.pct_chg>=0?'+':'')+latest.pct_chg.toFixed(2)+'%</div></div>'
    + '<div class="stat-card"><div class="label">最高价</div><div class="value">'+maxP.toFixed(2)+'</div></div>'
    + '<div class="stat-card"><div class="label">最低价</div><div class="value">'+minP.toFixed(2)+'</div></div>'
    + '<div class="stat-card"><div class="label">年内涨跌</div><div class="value '+(totalChange>=0?'up':'down')+'">'+(totalChange>=0?'+':'')+totalChange.toFixed(2)+'%</div></div>'
    + '<div class="stat-card"><div class="label">日均成交量</div><div class="value">'+(avgVol/10000).toFixed(0)+'<span style="font-size:12px;color:#888">万手</span></div></div>'
    + '<div class="stat-card"><div class="label">交易日数</div><div class="value">'+data.length+'<span style="font-size:12px;color:#888">天</span></div></div>';

  document.getElementById('update-time').textContent = '数据更新: ' + latest.date;
}

function updateAll(range) {
  var filtered = getFilteredData(range);
  document.getElementById('date-range-label').textContent =
    filtered.length > 0 ? filtered[0].date + ' ~ ' + filtered[filtered.length-1].date + ' · ' + filtered.length + '个交易日' : '';
  renderMain(filtered);
}

window.onload = function() {
  if (typeof echarts === 'undefined') {
    showError('ECharts 库加载失败！请确保 echarts.min.js 与本文件在同一目录。');
    return;
  }
  try {
    mainChart = echarts.init(document.getElementById('main-chart'));
    pctChart = echarts.init(document.getElementById('pct-chart'));
    monthlyChart = echarts.init(document.getElementById('monthly-chart'));

    updateStats(rawData);
    updateAll('all');
    renderPct(rawData);
    renderMonthly(rawData);

    document.querySelectorAll('.time-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.time-btn').forEach(function(b){b.classList.remove('active')});
        this.classList.add('active');
        updateAll(this.dataset.range);
      });
    });

    window.addEventListener('resize', function() {
      mainChart.resize();
      pctChart.resize();
      monthlyChart.resize();
    });
  } catch(e) {
    showError('图表渲染出错: ' + e.message);
  }
};
</script>
